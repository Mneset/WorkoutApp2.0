services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./workoutLogger
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_DIALECT: mysql
      DB_UNDERSCORED: "true"
      DB_TIMESTAMPS: "false"
      AUTH_AUDIENCE: ${AUTH_AUDIENCE}
      AUTH_ISSUER_BASE_URL: ${AUTH_ISSUER_BASE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api/v1}
        REACT_APP_API_AUDIENCE: ${REACT_APP_API_AUDIENCE}
        REACT_APP_ACCESS_DOMAIN: ${REACT_APP_ACCESS_DOMAIN}
        REACT_APP_ACCESS_CLIENT_ID: ${REACT_APP_ACCESS_CLIENT_ID}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
